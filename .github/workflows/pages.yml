name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'data/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build site bundle
        run: |
          mkdir -p _site
          cp -r site/* _site/
          mkdir -p _site/data
          cp -r data/* _site/data/

      - name: Patch DATA_BASE for Pages root
        run: |
          # Pages serves at /<repo>/ — site/app.js fetches '../data' which works when site/ is a subdir.
          # In the bundled root layout, app.js sits at /, data at /data → change DATA_BASE to './data'.
          sed -i "s|const DATA_BASE = '../data';|const DATA_BASE = './data';|" _site/app.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
