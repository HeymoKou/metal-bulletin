name: Probe KOMIS connectivity

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Test KOMIS access from GH Actions runner
        run: |
          set -e
          echo "=== runner public IP ==="
          curl -s --max-time 5 https://api.ipify.org; echo
          curl -s --max-time 5 https://ipinfo.io/json | head -20
          echo "=== KOMIS page ==="
          curl -sL -c /tmp/c -A 'Mozilla/5.0 (Macintosh) Chrome/131.0' \
            --max-time 15 'https://www.komis.or.kr/Komis/RsrcPrice/BaseMetals' \
            -o /tmp/page.html
          echo "page size: $(wc -c < /tmp/page.html)"
          echo "=== KOMIS ajax (Cu daily 2026) ==="
          curl -sL -b /tmp/c -A 'Mozilla/5.0 Chrome/131.0' --max-time 15 \
            -X POST -H 'X-Requested-With: XMLHttpRequest' \
            -H 'Referer: https://www.komis.or.kr/Komis/RsrcPrice/BaseMetals' \
            --data-urlencode 'mnrkndUnqRadioCd=MNRL0008' \
            --data-urlencode 'srchMnrkndUnqCd=MNRL0008' \
            --data-urlencode 'srchPrcCrtr=501' \
            --data-urlencode 'srchAvgOpt=DAY' \
            --data-urlencode 'srchField=year' \
            --data-urlencode 'srchStartDate=2026' \
            --data-urlencode 'srchEndDate=2026' \
            --data-urlencode 'lmeInvt=Y' \
            'https://www.komis.or.kr/Komis/RsrcPrice/ajax/getMnrlPrcByMnrkndUnqCd' > /tmp/k.json
          echo "ajax size: $(wc -c < /tmp/k.json)"
          head -c 400 /tmp/k.json; echo
