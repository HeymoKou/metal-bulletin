name: news

on:
  schedule:
    - cron: '0 0,12 * * *'  # UTC 0/12 = KST 9/21시 — 영업/야간 cover, 일 2회
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: news
  cancel-in-progress: false

jobs:
  collect-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5 (Node 24)

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0 (Node 24)
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --frozen

      - name: Scrape news
        run: uv run python -m scraper.news.run

      - name: Parse + classify
        run: uv run python -m parser.news.run

      - name: Summarize (LLM)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: uv run python -m summarizer.run

      - name: Build news parquet
        run: uv run python -m builder.news_build

      - name: Build events parquet (LME stocks)
        run: uv run python -m builder.events_build

      - name: Update manifest news/events section
        run: uv run python -m builder.news_manifest

      - name: Cleanup intermediate files
        run: rm -f data/news_pending.json data/news_enriched.json

      - name: Commit + push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/news data/events data/manifest.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "news: $(date -u +%Y-%m-%dT%H:%MZ)"
            # Pull-rebase to handle concurrent commits to main (concurrency group only
            # serializes news.yml, not unrelated commits). Up to 3 retries.
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break || sleep $((i * 5))
            done
          fi
