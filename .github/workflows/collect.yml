name: Collect Daily Metal Data

on:
  schedule:
    # KST 09:00 ~ 19:00 매시 (UTC 00 ~ 10), 평일
    - cron: '0 0-10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5 (Node 24)

      - name: Skip if today already collected
        id: gate
        run: |
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          LATEST=$(python3 -c "import json; print(json.load(open('data/manifest.json'))['last_updated'])" 2>/dev/null || echo "")
          echo "today=$TODAY, latest=$LATEST"
          if [ "$LATEST" = "$TODAY" ]; then
            echo "Today's data already collected; exiting early."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0 (Node 24)
        if: steps.gate.outputs.skip != 'true'

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: uv sync

      - name: Restore daily/ from raw archive
        if: steps.gate.outputs.skip != 'true'
        run: |
          # builder.load_dailies handles raw → daily; do it explicitly so scraper's
          # existing_dates() check sees prior dates and only fetches new ones.
          mkdir -p data/daily
          uv run python -c "
          from pathlib import Path
          import json, pyarrow.parquet as pq
          for f in sorted(Path('data/raw').glob('*.parquet')):
              for row in pq.read_table(f).to_pylist():
                  out = Path('data/daily') / f'{row[\"date\"]}.json'
                  if not out.exists():
                      out.write_text(row['json'])
          print('restored', len(list(Path('data/daily').glob('*.json'))), 'daily entries')
          "

      - name: Download latest PDF
        if: steps.gate.outputs.skip != 'true'
        run: uv run python -m scraper.download --mode latest --data-dir data --tmp-dir tmp/pdfs

      - name: Parse PDF
        if: steps.gate.outputs.skip != 'true'
        run: uv run python -m parser.parse --mode latest --data-dir data --tmp-dir tmp/pdfs

      - name: LME fallback via westmetall (when NH PDF missing — KR holiday cover)
        if: steps.gate.outputs.skip != 'true'
        run: |
          KST_TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          uv run python -m builder.lme_backfill --mode fallback --date "$KST_TODAY"

      - name: Fetch BOK ECOS exchange rates
        if: steps.gate.outputs.skip != 'true'
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: uv run python -m exchange.fetch_krw --data-dir data

      - name: Antimony (Sb) — once-per-day check
        if: steps.gate.outputs.skip != 'true'
        run: |
          KST_TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          STATE=data/.sb_last_check
          LAST=$(cat "$STATE" 2>/dev/null || echo "")
          if [ "$LAST" = "$KST_TODAY" ]; then
            echo "Sb already checked today ($LAST); skipping."
          else
            uv run python -m builder.sb_build --data-dir data
            echo "$KST_TODAY" > "$STATE"
          fi

      - name: Build timeseries
        if: steps.gate.outputs.skip != 'true'
        run: uv run python -m builder.build --data-dir data

      - name: Commit and push
        if: steps.gate.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: $(TZ=Asia/Seoul date +%Y-%m-%d %H:%M) update"
            git push
          fi
